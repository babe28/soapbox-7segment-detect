<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>7seg OBS Overlay</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: rgba(0, 0, 0, 0);
      --fg: #ffffff;
      --accent-upper: #ff5f57;
      --accent-lower: #42d392;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      overflow: hidden;
      font-family: "Consolas", "Courier New", monospace;
    }

    body {
      display: grid;
      place-items: center;
    }

    .wrap {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-rows: repeat(2, minmax(0, 1fr));
      gap: 1.5vh;
      align-items: center;
      justify-items: center;
    }

    .single {
      grid-template-rows: 1fr;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      font-size: min(20vw, 28vh);
      line-height: 1;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-shadow: 0 0 12px rgba(0, 0, 0, 0.8);
      color: var(--fg);
    }

    .upper { color: var(--accent-upper); }
    .lower { color: var(--accent-lower); }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div id="wrap" class="wrap">
    <div id="upper" class="row upper">---.---</div>
    <div id="lower" class="row lower">---.---</div>
  </div>

  <script>
    const target = __TARGET__;
    const wrapEl = document.getElementById("wrap");
    const upperEl = document.getElementById("upper");
    const lowerEl = document.getElementById("lower");

    if (target !== "both") {
      wrapEl.classList.add("single");
    }
    if (target === "lower") {
      upperEl.classList.add("hidden");
    }
    if (target === "upper") {
      lowerEl.classList.add("hidden");
    }

    function formatValue(value) {
      const raw = String(value || "").trim();
      if (!raw) {
        return "---.---";
      }
      if (raw.includes(".")) {
        return raw;
      }
      if (/^\d{6}$/.test(raw)) {
        return `${raw.slice(0, 3)}.${raw.slice(3)}`;
      }
      return raw;
    }

    function render(payload) {
      if (target !== "lower") {
        upperEl.textContent = formatValue(payload.upper);
      }
      if (target !== "upper") {
        lowerEl.textContent = formatValue(payload.lower);
      }
    }

    fetch("/state", { cache: "no-store" })
      .then((response) => response.json())
      .then(render)
      .catch(() => null);

    const source = new EventSource("/events");
    source.addEventListener("update", (event) => {
      try {
        render(JSON.parse(event.data));
      } catch (_error) {
      }
    });
  </script>
</body>
</html>
